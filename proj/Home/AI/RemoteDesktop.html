<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark" style="height:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Remote Desktop</title>
<link rel="stylesheet" href="../../../artgine/external/legacy/bootstrap-5.3.3-dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../../../artgine/external/legacy/bootstrap-icons-1.11.3/bootstrap-icons.css">
<script src="../../../artgine/external/legacy/bootstrap-5.3.3-dist/js/bootstrap.min.js" defer></script>
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; overflow: hidden; }
body { display: flex; flex-direction: column; }
#imgWrap { flex: 1 1 0; min-height: 0; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
#imgWrap:focus { outline: none; }
@keyframes remote-ripple { 0%{transform:scale(1);opacity:1;} 100%{transform:scale(2.5);opacity:0;} }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="loginOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-body" style="z-index:9999;display:none!important;">
    <div class="card shadow" style="min-width:320px;">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-display me-2"></i>Remote Desktop</h5>
            <div class="mb-2">
                <input id="loginPw" type="password" class="form-control" placeholder="Password" autocomplete="current-password">
            </div>
            <div id="loginMsg" class="small text-danger mb-2" style="min-height:1.2em;"></div>
            <button id="loginBtn" class="btn btn-primary w-100">Sign in</button>
        </div>
    </div>
</div>

<!-- Controls bar -->
<div id="controlsBar" class="d-flex align-items-center gap-2 px-2 flex-shrink-0" style="height:36px;background:#1e1e1e;border-bottom:1px solid #333;font-size:0.75rem;color:#aaa;">
    <input id="rateSlider" type="range" class="form-range" min="0.05" max="10" step="0.05" value="0.5" style="width:86px;">
    <span id="rateLabel" style="min-width:2rem;">0.5s</span>
    <div id="inputModeRow" class="d-flex align-items-center gap-1">
        <span>input</span>
        <input id="inputToggle" type="checkbox" class="form-check-input ms-1">
    </div>
</div>

<!-- Screenshot (센터 - 남은 공간 모두 차지) -->
<div id="imgWrap" tabindex="-1">
    <img id="screenshot" style="width:100%;height:100%;object-fit:contain;" alt="">
</div>

<script type="module" src="./RemoteDesktop.js"></script>
</body>
</html>
