<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<script>
const _assetBase = '/' + location.pathname.split('/')[1] + '/';
document.write('<link rel="stylesheet" href="' + _assetBase + 'Artgine/artgine/external/legacy/bootstrap-5.3.3-dist/css/bootstrap.min.css">');
document.write('<link rel="stylesheet" href="' + _assetBase + 'Artgine/artgine/external/legacy/bootstrap-icons-1.11.3/bootstrap-icons.css">');
document.write('<script src="' + _assetBase + 'Artgine/artgine/external/legacy/bootstrap-5.3.3-dist/js/bootstrap.min.js" defer><\/script>');
</script>
<style>
html, body, #terminal-screen, #ttyd-frame { width: 100%; height: 100%; }
#terminal-screen { display: none; }
#ttyd-frame { border: 0; }
</style>
</head>
<body class="overflow-hidden m-0 bg-body" style="height:100vh;height:100dvh;">

<!-- Login overlay -->
<div id="auth-screen" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-body" style="z-index: 9999; display: none !important;">
    <div class="card shadow" style="min-width: 320px;">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-terminal me-2"></i>Terminal</h5>
            <div class="mb-2">
                <input id="pw-input" type="password" class="form-control" placeholder="Password" autocomplete="current-password">
            </div>
            <div id="auth-err" class="small text-danger mb-2" style="min-height: 1.2em;"></div>
            <button id="login-btn" class="btn btn-primary w-100">Sign in</button>
        </div>
    </div>
</div>

<!-- Terminal -->
<main id="terminal-screen" class="h-100 overflow-hidden">
    <iframe id="ttyd-frame" class="d-block w-100 h-100 border-0" src=""></iframe>
</main>

<script type="module" src="./Terminal.js"></script>
</body>
</html>
