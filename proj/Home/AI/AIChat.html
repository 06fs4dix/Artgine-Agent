<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link rel="stylesheet" href="../../../Artgine/artgine/external/legacy/bootstrap-5.3.3-dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../../../Artgine/artgine/external/legacy/bootstrap-icons-1.11.3/bootstrap-icons.css">
<script src="../../../Artgine/artgine/external/legacy/bootstrap-5.3.3-dist/js/bootstrap.min.js" defer></script>
</head>
<body class="d-flex overflow-hidden m-0" style="height:100vh;height:100dvh;">

<!-- Login overlay -->
<div id="loginOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-body" style="z-index: 9999;">
    <div class="card shadow" style="min-width: 320px;">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-shield-lock me-2"></i>AI Chat</h5>
            <div class="mb-2">
                <input id="loginPw" type="password" class="form-control" placeholder="Password" autocomplete="current-password">
            </div>
            <div id="loginMsg" class="small text-danger mb-2" style="min-height: 1.2em;"></div>
            <button id="loginBtn" class="btn btn-primary w-100">Sign in</button>
        </div>
    </div>
</div>


<!-- Main -->
<main class="flex-grow-1 d-flex flex-column overflow-hidden">
    <!-- Topbar -->
    <div id="topbar" class="d-flex align-items-center gap-2 p-2 border-bottom bg-body-tertiary">
        <select id="providerSel" class="form-select form-select-sm w-auto">
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
        </select>
        <select id="modelSel" class="form-select form-select-sm w-auto"></select>
        <div class="flex-grow-1"></div>
        <span id="status" class="badge text-bg-secondary">disconnected</span>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-grow-1 overflow-auto p-3">
        <div id="emptyState" class="text-center text-secondary mt-5">
            <i class="bi bi-chat-dots fs-1 d-block mb-2"></i>
            <div>Start a new conversation.</div>
        </div>
    </div>

    <!-- Composer -->
    <div id="composer" class="border-top bg-body-tertiary p-2">
        <div id="attachPreview" class="d-flex flex-wrap gap-1 mb-2"></div>
        <div class="d-flex gap-2 align-items-end">
            <button id="fileBtn" class="btn btn-outline-secondary" title="Attach file">
                <i class="bi bi-paperclip"></i>
            </button>
            <input type="file" id="fileInput" multiple class="d-none">
            <textarea id="input" class="form-control" placeholder="Message..." rows="1" style="resize: none; max-height: 200px;"></textarea>
            <button id="sendBtn" class="btn btn-primary">
                <i class="bi bi-send"></i>
            </button>
        </div>
    </div>
</main>

<!-- Minimal custom styles only for things BS5 utilities can't express cleanly -->
<style>
.msg-bubble { white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; }
.msg-streaming::after { content: '▎'; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
.attachment-img { max-width: 200px; max-height: 200px; cursor: pointer; }
.msg-bubble pre { background: var(--bs-tertiary-bg); padding: .5rem; border-radius: .25rem; overflow-x: auto; }
.msg-bubble code { font-family: var(--bs-font-monospace); font-size: .875em; }
body.share-mode #topbar,
body.share-mode #composer,
body.share-mode #loginOverlay { display: none !important; }
</style>

<script type="module" src="./AIChat.js"></script>
</body>
</html>
